{% extends "base.html" %}

{% block content %}
<div class="admin-container">
    <div class="admin-tabs">
        <a href="{{ url_for('admin.users') }}" class="admin-tab">Пользователи</a>
        <a href="{{ url_for('admin.symbols') }}" class="admin-tab active">Символы</a>
    </div>

    <div class="admin-header">
        <h1 class="admin-title">Управление символами</h1>
        <a href="{{ url_for('admin.new_symbol') }}" class="btn-admin btn-admin-primary">Добавить символ</a>
    </div>
    
    <div class="table-responsive">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название символа</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for symbol in symbols %}
                <tr>
                    <td>{{ symbol.symbol_id }}</td>
                    <td>{{ symbol.name }}</td>
                    <td class="admin-actions">
                        <a href="{{ url_for('admin.edit_symbol', symbol_id=symbol.symbol_id) }}" class="btn-admin btn-admin-warning">Редактировать</a>
                        <form method="POST" action="{{ url_for('admin.delete_symbol', symbol_id=symbol.symbol_id) }}" style="display: inline;" onsubmit="return confirm('Удалить символ {{ symbol.name }}?')">
                            <button type="submit" class="btn-admin btn-admin-danger">Удалить</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="empty-state">Нет символов. Добавьте первый!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}
