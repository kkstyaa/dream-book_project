{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Регистрация</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="auth-label">Логин</label>
                <input type="text" name="login" class="auth-input" required>
            </div>
            <div class="mb-3">
                <label class="auth-label">Email</label>
                <input type="email" name="email" class="auth-input" required>
            </div>
            <div class="mb-3">
                <label class="auth-label">Пароль</label>
                <input type="password" name="password" class="auth-input" required>
            </div>
            <div class="mb-3">
                <label class="auth-label">Подтвердите пароль</label>
                <input type="password" name="confirm_password" class="auth-input" required>
            </div>
            <button type="submit" class="auth-btn auth-btn-primary w-100">Зарегистрироваться</button>
            <div class="auth-footer">
                Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" class="auth-link">Войти</a>
            </div>
        </form>
    </div>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}
